{% extends 'base.html' %}

{% block header %}
<h1>{% block title %}Buy Stocks{% endblock %}</h1>
{% endblock %}

{% block content %}
<form method="post">
	<label for="symbol">Symbol</label>
	<input name="symbol" id="symbol" required>
	<input type="submit" value="Lookup">
</form>
<h3>Your balance: </h3>
{% if info %}
<p>{{ info["symbol"] ~ " " ~ info["regularMarketPrice"] }}</p>
{% endif %}
{% endblock %}
